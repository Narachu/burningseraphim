<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Photo Album</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #242424;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            border: 4px solid #000;
            padding: 15px;
            background-color: #cf7b7b;
        }

        .title {
            border: 2px solid #000;
            text-align: center;
            padding: 50px 10px;
            font-size: 64px;
            font-weight: bold;
            margin-bottom: 0px;
            background-color: #cf7b7b;
        }

        .columns {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            margin-bottom: 20px;
            gap: 20px;
        }

        .column {
            flex: 1;
            border: 2px solid #000;
            display: flex;
            flex-direction: column;
            background-color: #d69a9a;
            min-height: 520px;
        }

        .column-header {
            border-bottom: 2px solid #000;
            text-align: center;
            padding: 20px 10px;
            font-size: 20px;
            font-weight: 500;
        }

        .column-content {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Coming Soon Box */
        .coming-soon {
            border: 2px solid #000;
            background-color: #ffffff;
            padding: 30px 60px;
            font-size: 36px;
            font-weight: 500;
        }

        .imagel {
          border: 2px solid #000;
            width: 23%;
            height: 250px;
            float: left;
            object-fit: cover;
        }
        .imager {   
          border: 2px solid #000;
            width: 23%;
            height: 250px;
            float: right;
            object-fit: cover;
        }
        
        .server-info {
            font-size: 18px;
            margin-top: 10px;
        }

        /* Survey list styling */
        .survey-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 27px;
        }

        .survey-list li {
            margin: 20px 0;
            color: white;
            font-size: 70px;
        }
        .footer-link {
             text-align: center;
               margin-top: 30px;
        }

        .footer-link a {
           color: white;
          font-size: 30px;
          text-decoration: none;
}

        .footer-link a:hover {
            text-decoration: underline;
}

        @media (max-width: 900px) {
            .columns {
                flex-direction: column;
            }
        }
        
    </style>
</head>
<body>

        <div class="inner-container">

            <img src="bc577c08a53fb78e7ae206ab864792ae.jpg" alt="Bonfire" class="imagel"> <img src="STAR.png" alt="Bonfire" class="imagel"> <img src="bear5.jpg" alt="Bonfire" class="imager"> <img src="bonfire.jpg.jpg" alt="Bonfire" class="imager">
            <img src="wasdwa.jpg" alt="Bonfire" class="imagel"> <img src="that_is_not_a_dog.png" alt="Bonfire" class="imagel"> <img src="stroheim.png" alt="Bonfire" class="imager"> <img src="card-E0zK3-art_crop.png" alt="Bonfire" class="imager">
            <img src="cru4.png" alt="Bonfire" class="imagel"> <img src="cru3.png" alt="Bonfire" class="imagel"> <img src="cru2.png" alt="Bonfire" class="imager"> <img src="cru1.png" alt="Bonfire" class="imager">
            <img src="imagenar.png" alt="Bonfire" class="imagel"> <img src="bonfire.jpg.jpg" alt="Bonfire" class="imagel"> <img src="bonfire.jpg.jpg" alt="Bonfire" class="imager"> <img src="bonfire.jpg.jpg" alt="Bonfire" class="imager">
        </div>
    </div>
</body>
</html>
